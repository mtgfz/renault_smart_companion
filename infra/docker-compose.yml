version: "3.9"

# Stack MVP pour le développement local (2 mois de stage)
# Cible production : ajouter Spark, Airflow, Redis, ClickHouse, Kubernetes (voir docs/architecture.md)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: renault_smart_companion
      POSTGRES_USER: rsc_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

  api:
    build: ../couche-serving
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://rsc_user:change_me@postgres:5432/renault_smart_companion

volumes:
  pgdata:
